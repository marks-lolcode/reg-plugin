<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CONvergence Check-In — Debug Walk Report</title>

<!--
  Manager Debug Walk report page (extension page, opened in a new tab by
  background.js on ACTION.OPEN_DEBUG_REPORT). Reads STORAGE_KEY.DEBUG_REPORT
  and renders one section per page visited during the walk.

  MV3 CSP forbids inline scripts, so all logic lives in js/debug-report.js.
  The script files below provide STORAGE_KEY / CONFIG / ACTION, loaded in the
  same order the content scripts use.
-->

<style>
  :root {
    --red: #dc3545; --green: #28a745; --amber: #b8860b;
    --border: #d8d8d8; --bg-soft: #f7f7f7; --ink: #222;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    margin: 0 auto; padding: 24px; max-width: 1100px; color: var(--ink); line-height: 1.45;
  }
  h1 { font-size: 21px; margin: 0 0 2px; }
  p.sub { color: #666; margin: 0 0 16px; font-size: 13px; }
  h2 { font-size: 16px; margin: 26px 0 6px; border-bottom: 2px solid var(--border); padding-bottom: 4px; }
  h3 { font-size: 13px; margin: 14px 0 4px; color: #444; }
  .card { border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin: 10px 0; }
  .card.notreached { background: var(--bg-soft); color: #888; }
  .banner { margin: 16px 0; padding: 12px 14px; border-radius: 8px; font-weight: 600; font-size: 14px; }
  .banner.ok   { background: #e7f6ec; color: #1a7a37; border: 1px solid #b6e2c4; }
  .banner.bad  { background: #fdeaec; color: #a51d2a; border: 1px solid #f3b9c0; }
  .banner.warn { background: #fff8e1; color: #7a5c00; border: 1px solid #f0e0a0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 4px 0 8px; }
  th, td { text-align: left; padding: 5px 8px; border-bottom: 1px solid #ececec; vertical-align: top; }
  th { background: var(--bg-soft); font-weight: 600; }
  td.mono, th.mono { font-family: ui-monospace, Menlo, Consolas, monospace; font-size: 12px; }
  tr.bad td { background: #fdeaec; }
  .pill { display: inline-block; padding: 1px 9px; border-radius: 10px; font-size: 11px; font-weight: 600; }
  .pill.ok { background: #e7f6ec; color: var(--green); }
  .pill.bad { background: #fdeaec; color: var(--red); }
  .pill.warn { background: #fff8e1; color: var(--amber); }
  ul.issues { margin: 6px 0 0; padding-left: 18px; font-size: 13px; }
  ul.issues li.error { color: var(--red); }
  ul.issues li.warning { color: var(--amber); }
  .empty { color: #999; font-style: italic; }
  .muted { color: #999; }
  .kv { font-size: 12px; color: #555; margin: 2px 0 6px; }
  footer { margin-top: 30px; color: #999; font-size: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
</style>
</head>
<body>

<h1>Debug Walk Report</h1>
<p class="sub" id="subtitle">Manager debug walk — field audit across the account, registration, and attendee pages.</p>

<div id="app"></div>

<footer>
  Generated by the Manager Debug Walk. Reflects the live <code>config.js</code> field labels.
  Re-run from an account page with Manager Override + Debugging enabled.
</footer>

<script src="shared/js/constants-base.js"></script>
<script src="config.js"></script>
<script src="js/constants.js"></script>
<script src="js/config-doctor.js"></script>
<script src="js/debug-report.js"></script>

</body>
</html>
