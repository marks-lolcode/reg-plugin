<!-- popup.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CONvergence Check-In</title>
  <style>
    body {
      min-width: 360px;
      max-width: 400px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      padding: 8px;
      margin: 0;
    }

    /* ── Manager override persistent bar ── */
    .override-bar {
      width: 100%;
      padding: 8px 0;
      margin: -8px -8px 8px -8px;
      width: calc(100% + 16px);
      background: #dc3545;
      color: #ffffff;
      font-size: 13px;
      font-weight: bold;
      text-align: center;
      letter-spacing: 2px;
      box-sizing: border-box;
    }

    /* ── Status banner ── */
    .banner { padding: 10px; border-radius: 4px; margin-bottom: 8px; font-size: 13px; }
    .banner-green  { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; font-weight: bold; }
    .banner-yellow { background: #fff3cd; color: #856404; border: 1px solid #ffc107; font-weight: bold; }
    .banner-red    { background: #f8d7da; color: #721c24; border: 2px solid #dc3545; }

    .banner-stop { font-size: 16px; font-weight: bold; margin-bottom: 8px; letter-spacing: 1px; }

    /* ── Reason blocks inside the banner ── */
    .reason-block { margin: 0; padding: 4px 0; }
    .reason-title { font-weight: bold; }
    .reason-body  { font-weight: normal; white-space: pre-line; margin-top: 2px; font-size: 12px; }

    .reason-divider { border: none; border-top: 1px solid rgba(114, 28, 36, 0.25); margin: 6px 0; }
    .banner-yellow .reason-divider { border-top-color: rgba(133, 100, 4, 0.25); }
    .banner-green  .reason-divider { border-top-color: rgba(21, 87, 36, 0.25); }

    /* ── Re-check section (below the banner) ── */
    .recheck-section { margin-bottom: 8px; }
    .recheck-block   { display: flex; gap: 6px; margin-bottom: 6px; }

    /* ── Info table ── */
    table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
    td    { padding: 4px 6px; border-bottom: 1px solid #eee; vertical-align: middle; }
    td.label { font-weight: bold; white-space: nowrap; width: 42%; color: #555; font-size: 12px; }

    /* ── Badge number + ticket type ── */
    .badge-number-cell { text-align: center; padding: 10px 6px 14px; border-bottom: 2px solid #ccc; }
    .badge-number-label { font-size: 11px; font-weight: bold; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .badge-number-value { font-size: 48px; font-weight: bold; color: #111; line-height: 1; letter-spacing: 2px; }
    .badge-ticket-value { font-size: 22px; font-weight: bold; color: #333; text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; }

    /* DOB cutoff shown beneath ticket type when age verification is required */
    .badge-dob-cutoff { font-size: 22px; font-weight: bold; color: #856404; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }

    /* ── Legal / preferred name ── */
    .legal-name-value { font-size: 18px; font-weight: bold; color: #111; }

    /* ── Age cutoff (ID-check step table row) ── */
    .age-cutoff-label { font-size: 12px; color: #856404; }
    .age-cutoff-date  { font-size: 20px; font-weight: bold; color: #856404; }

    /* ── Warnings ── */
    .warning { background: #fff3cd; border: 1px solid #ffc107; border-radius: 4px; padding: 8px; margin-bottom: 8px; white-space: pre-line; font-size: 12px; }

    /* ── Button row for Show Me / Re-check ── */
    .btn-row { display: flex; gap: 6px; margin-top: 6px; }
    .btn-show-field { flex: 1; padding: 4px 8px; background: #856404; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; }
    .btn-show-field:hover { background: #664d03; }
    .btn-recheck { flex: 1; padding: 4px 8px; background: #0d6efd; color: white; border: none; border-radius: 3px; cursor: pointer; font-size: 12px; }
    .btn-recheck:hover { background: #0a58ca; }

    /* ── Help Desk note ── */
    .helpdesk-note { width: 100%; padding: 10px; background: #f8d7da; color: #721c24; border: 1px solid #dc3545; border-radius: 4px; font-size: 13px; font-weight: bold; text-align: center; box-sizing: border-box; }

    /* ── Age verified button ── */
    .btn-age-verify { width: 100%; padding: 10px; background: #fd7e14; color: white; border: none; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 4px; }
    .btn-age-verify:hover { background: #e06a00; }

    /* ── Badge Delivered button ── */
    .btn-checkin { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; }
    .btn-checkin:hover    { background: #218838; }
    .btn-checkin:disabled { background: #6c757d; cursor: not-allowed; }

    /* ── Do Not Issue Badge button (hold active) ── */
    .btn-no-issue { width: 100%; padding: 10px; background: #6c757d; color: white; border: 2px solid #dc3545; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: not-allowed; letter-spacing: 1px; }

    /* ── Confirmation screen ── */
    .confirm-screen  { text-align: center; padding: 20px 10px; background: #d4edda; border-radius: 4px; }
    .confirm-icon    { font-size: 40px; color: #28a745; margin-bottom: 4px; }
    .confirm-title   { font-size: 18px; font-weight: bold; color: #155724; margin-bottom: 8px; }
    .confirm-name    { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
    .confirm-badge   { font-size: 14px; color: #555; margin-bottom: 8px; }
    .confirm-detail  { font-size: 12px; color: #155724; white-space: pre-line; }

    /* ── Error screen ── */
    .error-screen  { text-align: center; padding: 16px 10px; background: #f8d7da; border-radius: 4px; }
    .error-icon    { font-size: 32px; color: #dc3545; margin-bottom: 8px; }
    .error-message { font-size: 13px; color: #721c24; white-space: pre-line; text-align: left; }

    /* ── Registrations view ── */
    .heading     { font-weight: bold; margin-bottom: 8px; }
    .reg-row     { padding: 8px; margin-bottom: 6px; border-radius: 4px; border: 1px solid #ddd; }
    .reg-row-green  { background: #f8fff9; }
    .reg-row-yellow { background: #fffef0; }
    .reg-row-red    { background: #fff5f5; }
    .reg-name    { font-weight: bold; margin-bottom: 2px; }
    .reg-ticket  { font-size: 12px; color: #555; margin-bottom: 4px; }

    /* ── Inline Help Desk note (reg page) ── */
    .helpdesk-note-inline { font-size: 12px; font-weight: bold; color: #721c24; padding: 4px 8px; background: #f8d7da; border: 1px solid #dc3545; border-radius: 3px; display: inline-block; }

    /* ── Override button (manager, reg page) ── */
    .btn-override { padding: 5px 10px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
    .btn-override:hover { background: #b02a37; }

    /* ── Check In button (reg page) ── */
    .btn-select { padding: 5px 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; white-space: nowrap; }
    .btn-select:hover { background: #0056b3; }

    /* ── Not found / guidance view ── */
    .not-found-heading { font-weight: bold; font-size: 14px; color: #721c24; margin-bottom: 6px; padding: 8px; background: #f8d7da; border-radius: 4px; }
    .not-found-detail  { font-size: 12px; color: #555; white-space: pre-line; padding: 8px; line-height: 1.6; }
  </style>
</head>
<body>
  <script src="config.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
<!-- end popup.html -->
