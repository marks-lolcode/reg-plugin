<!-- popup.html
     ---------------------------------------------------------------
     Extension popup window for the CONvergence Check-In extension.
     All styles live in css/popup.css — do not add <style> blocks here.
     Scripts are loaded in dependency order:
       1. config.js           — annual settings (event IDs, field labels)
       2. js/constants.js     — shared string constants (STATE, ACTION, etc.)
       4. js/popup.js         — UI logic, last so globals are available
     --------------------------------------------------------------- -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CONvergence Check-In</title>
  <link rel="stylesheet" href="css/popup.css">
</head>
<body>
  <script src="config.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
<!-- end popup.html -->
