<!-- extension_options_page.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CONvergence Check-In — Options</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      max-width: 400px;
    }

    h2 {
      font-size: 16px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 4px;
      font-weight: bold;
      font-size: 13px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 6px;
      box-sizing: border-box;
      margin-bottom: 12px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: 13px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .checkbox-row input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .checkbox-row label {
      margin: 0;
      font-weight: normal;
      cursor: pointer;
    }

    #password-row {
      display: none;
      margin-bottom: 12px;
    }

    #status {
      min-height: 20px;
      margin-bottom: 8px;
      font-size: 13px;
      font-weight: bold;
      color: #155724;
    }

    #status.error { color: #721c24; }

    button {
      padding: 8px 20px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { background: #0056b3; }
  </style>
</head>
<body>
  <h2>CONvergence Check-In — Options</h2>

  <div class="checkbox-row">
    <input type="checkbox" id="mngtoverride">
    <label for="mngtoverride">Enable Management Override</label>
  </div>

  <div id="password-row">
    <label for="mngt-password">Management Password:</label>
    <input type="password" id="mngt-password" placeholder="Enter password to enable override">
  </div>

  <div id="status"></div>
  <button id="save">Save Options</button>

  <script src="config.js"></script>
  <script src="js/constants.js"></script>
  <script src="js/options.js"></script>
</body>
</html>
<!-- end extension_options_page.html -->
